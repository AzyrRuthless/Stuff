name: Build Tools (Android Only)

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r29
        add-to-path: true

    - name: Prepare Output Directories
      run: |
        mkdir -p build/android-arm64
        mkdir -p build/android-arm32
        mkdir -p build/android-x64
        mkdir -p build/android-x86

    # ---------------------------------------------------------
    # ANDROID ARM64 (aarch64)
    # ---------------------------------------------------------
    - name: Compile for Android ARM64
      run: |
        NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        CC="$NDK_BIN/clang"
        STRIP="$NDK_BIN/llvm-strip"
        FLAGS="--target=aarch64-linux-android21 -fPIE -pie -O3 -Wall -Wextra"
        OUT="build/android-arm64"

        $CC $FLAGS -o $OUT/heap-test brk/heap-test.c
        $CC $FLAGS -pthread -o $OUT/pipe-latency pipe-latency/pipe-latency.c
        $CC $FLAGS -o $OUT/pipebench pipebench/pipebench.c
        $CC $FLAGS -o $OUT/callbench callbench/callbench.c
        $CC $FLAGS -pthread -o $OUT/hackbench hackbench/hackbench.c
        $CC $FLAGS -o $OUT/syscall-check syscall/syscall.c
        $CC $FLAGS -o $OUT/ksu_profile ksuprofile/ksu_profile.c

        $STRIP $OUT/*

    # ---------------------------------------------------------
    # ANDROID ARM32 (armv7a)
    # ---------------------------------------------------------
    - name: Compile for Android ARM32
      run: |
        NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        CC="$NDK_BIN/clang"
        STRIP="$NDK_BIN/llvm-strip"
        FLAGS="--target=armv7a-linux-androideabi21 -fPIE -pie -O3 -Wall -Wextra"
        OUT="build/android-arm32"

        $CC $FLAGS -o $OUT/heap-test brk/heap-test.c
        $CC $FLAGS -pthread -o $OUT/pipe-latency pipe-latency/pipe-latency.c
        $CC $FLAGS -o $OUT/pipebench pipebench/pipebench.c
        $CC $FLAGS -o $OUT/callbench callbench/callbench.c
        $CC $FLAGS -pthread -o $OUT/hackbench hackbench/hackbench.c
        $CC $FLAGS -o $OUT/syscall-check syscall/syscall.c
        $CC $FLAGS -o $OUT/ksu_profile ksuprofile/ksu_profile.c

        $STRIP $OUT/*

    # ---------------------------------------------------------
    # ANDROID x64 (x86_64)
    # ---------------------------------------------------------
    - name: Compile for Android x64
      run: |
        NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        CC="$NDK_BIN/clang"
        STRIP="$NDK_BIN/llvm-strip"
        FLAGS="--target=x86_64-linux-android21 -fPIE -pie -O3 -Wall -Wextra"
        OUT="build/android-x64"

        $CC $FLAGS -o $OUT/heap-test brk/heap-test.c
        $CC $FLAGS -pthread -o $OUT/pipe-latency pipe-latency/pipe-latency.c
        $CC $FLAGS -o $OUT/pipebench pipebench/pipebench.c
        $CC $FLAGS -o $OUT/callbench callbench/callbench.c
        $CC $FLAGS -pthread -o $OUT/hackbench hackbench/hackbench.c
        $CC $FLAGS -o $OUT/syscall-check syscall/syscall.c
        $CC $FLAGS -o $OUT/ksu_profile ksuprofile/ksu_profile.c

        $STRIP $OUT/*

    # ---------------------------------------------------------
    # ANDROID x86 (i686)
    # ---------------------------------------------------------
    - name: Compile for Android x86
      run: |
        NDK_BIN="$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        CC="$NDK_BIN/clang"
        STRIP="$NDK_BIN/llvm-strip"
        FLAGS="--target=i686-linux-android21 -fPIE -pie -O3 -Wall -Wextra"
        OUT="build/android-x86"

        $CC $FLAGS -o $OUT/heap-test brk/heap-test.c
        $CC $FLAGS -pthread -o $OUT/pipe-latency pipe-latency/pipe-latency.c
        $CC $FLAGS -o $OUT/pipebench pipebench/pipebench.c
        $CC $FLAGS -o $OUT/callbench callbench/callbench.c
        $CC $FLAGS -pthread -o $OUT/hackbench hackbench/hackbench.c
        $CC $FLAGS -o $OUT/syscall-check syscall/syscall.c
        $CC $FLAGS -o $OUT/ksu_profile ksuprofile/ksu_profile.c

        $STRIP $OUT/*

    # ---------------------------------------------------------
    # CHECKSUMS & ARTIFACTS
    # ---------------------------------------------------------
    - name: Generate Checksums
      run: |
        cd build
        sha256sum android-arm64/* > android-arm64/SHA256SUMS.txt
        sha256sum android-arm32/* > android-arm32/SHA256SUMS.txt
        sha256sum android-x64/* > android-x64/SHA256SUMS.txt
        sha256sum android-x86/* > android-x86/SHA256SUMS.txt

    - name: Upload Android ARM64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tools-android-arm64
        path: build/android-arm64/*
        retention-days: 5

    - name: Upload Android ARM32 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tools-android-arm32
        path: build/android-arm32/*
        retention-days: 5

    - name: Upload Android x64 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tools-android-x64
        path: build/android-x64/*
        retention-days: 5

    - name: Upload Android x86 Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: tools-android-x86
        path: build/android-x86/*
        retention-days: 5
